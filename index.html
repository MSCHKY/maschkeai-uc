<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maschke.ai — Kreativ-Agentur für Künstliche Intelligenz</title>
  <meta name="description"
    content="maschke.ai — Kreativ-Agentur für KI-Beratung, Workshops und kreative KI-Projekte. Coming Soon.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="format-detection" content="email=no, telephone=no">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="canonical" href="https://maschke.ai">
  <meta property="og:title" content="maschke.ai — Coming Soon">
  <meta property="og:description" content="Keine alten Programme mit KI-Aufkleber. Systeme, die echte Arbeit mitdenken. Coming Soon.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://maschke.ai">
  <meta property="og:image" content="https://maschke.ai/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="maschke.ai — Coming Soon">
  <meta name="twitter:description" content="Keine alten Programme mit KI-Aufkleber. Systeme, die echte Arbeit mitdenken. Coming Soon.">
  <meta name="twitter:image" content="https://maschke.ai/og-image.png">
</head>

<body>
  <!-- Ambient floating particles — data streams in the background -->
  <div id="bg-particles" aria-hidden="true">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div id="terminal-plasma" aria-hidden="true">
    <div class="plasma-blob plasma-blob-1"></div>
    <div class="plasma-blob plasma-blob-2"></div>
    <div class="plasma-blob plasma-blob-3"></div>
  </div>

  <div id="terminal">
    <div id="terminal-output"></div>
    <div id="terminal-separator"></div>
    <div id="terminal-input-line">
      <span id="prompt"><span class="prompt-full">nexus@maschke.ai ~ %</span><span class="prompt-short">nexus &gt;</span>&nbsp;</span>
      <input type="text" id="terminal-input" autocomplete="off" autocorrect="off" autocapitalize="off"
        spellcheck="false" aria-label="Terminal input" size="1"><span id="block-cursor">█</span>
    </div>
    <div id="terminal-separator-bottom"></div>
    <div id="terminal-status-bar">
      <span class="status-left">nexus://uplink (secure)</span>
      <span class="status-center">maschke.ai</span>
      <span class="status-right">NEXUS OS · UC</span>
    </div>
  </div>

  <!-- Astronaut Yori — floating pixel mascot -->
  <div id="astronaut-overlay" aria-hidden="true">
    <div id="astronaut-bubble"></div>
    <button type="button" id="astronaut-sprite" aria-label="Astronaut"></button>
  </div>

  <!-- Astronaut Debug Panel (visible at ?debug=1) -->
  <div id="astro-debug"></div>

  <!-- DSGVO-konform: Impressum & Datenschutz als sichtbare Links (max 2 Klicks, §5 DDG) -->
  <footer id="legal-footer">
    <a href="#" id="link-impressum">Impressum</a>
    <span class="separator">|</span>
    <a href="#" id="link-datenschutz">Datenschutz</a>
    <span class="separator">|</span>
    <button id="theme-toggle" title="Theme wechseln">◐</button>
  </footer>

  <!-- Legal overlay (floating panel) -->
  <div id="legal-overlay">
    <div id="legal-overlay-panel">
      <div id="legal-overlay-header">
        <span id="legal-overlay-title"></span>
        <button id="legal-overlay-close">[ESC] Schließen</button>
      </div>
      <div id="legal-overlay-content"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
